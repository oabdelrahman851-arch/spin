<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ عجلة الحظ ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --bg2: #1a1640;
    --bg3: #24213e;
    --accent: #ffcc00;
    --accent2: #a777e3;
    --accent3: #6e8efb;
    --text: #ffffff;
    --text2: rgba(255,255,255,0.55);
    --glass: rgba(255,255,255,0.08);
    --glass2: rgba(255,255,255,0.13);
    --border: rgba(255,255,255,0.15);
    --glow: rgba(255,204,0,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* PARTICLES */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .content { position: relative; z-index: 1; }

  /* HEADER */
  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    animation: fadeInDown 0.8s ease;
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,204,0,0.12);
    border: 1px solid rgba(255,204,0,0.35);
    border-radius: 999px;
    padding: 6px 20px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 1.2rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 900;
    background: linear-gradient(to right, #ffffff, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
    text-shadow: none;
  }

  .subtitle {
    font-size: 1.05rem;
    color: var(--text2);
  }

  /* MAIN GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 2rem;
    max-width: 1100px;
    margin: 1.5rem auto;
    padding: 0 1.2rem 4rem;
    align-items: start;
  }

  /* WHEEL AREA */
  .wheel-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  .wheel-wrapper {
    position: relative;
    width: min(420px, 88vw);
    height: min(420px, 88vw);
  }

  #wheelCanvas {
    width: 100% !important;
    height: 100% !important;
    border: 8px solid var(--glass2);
    border-radius: 50%;
    box-shadow:
      0 0 60px rgba(110,142,251,0.25),
      0 0 120px rgba(167,119,227,0.15),
      0 0 20px var(--glow);
  }

  /* POINTER — LEFT side */
  .pointer-wrap {
    position: absolute;
    top: 50%;
    left: -28px;
    transform: translateY(-50%);
    z-index: 10;
  }
  .pointer {
    width: 0; height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-left: 34px solid var(--accent);
    filter: drop-shadow(0 0 8px rgba(255,204,0,0.7));
  }

  .center-dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--accent);
    box-shadow: 0 0 20px var(--glow);
    z-index: 5;
  }

  /* SPIN BTN */
  .spin-btn {
    padding: 16px 64px;
    font-size: 1.2rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: var(--accent);
    color: #000;
    box-shadow: 0 5px 20px rgba(255,204,0,0.45);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }
  .spin-btn:hover::before { left: 100%; }
  .spin-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(255,204,0,0.6); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* WINNER DISPLAY */
  .winner-display {
    width: 100%;
    max-width: 420px;
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 28px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  }
  .winner-display.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .winner-label {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .winner-name {
    font-family: 'Tajawal', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(to right, #fff, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    top: -20px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .panel {
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    animation: fadeInDown 0.8s ease;
  }

  .panel-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* INPUT */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .name-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: none;
    border-bottom: 2px solid var(--accent);
    border-radius: 10px 10px 0 0;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: background 0.2s;
    direction: rtl;
  }
  .name-input:focus { background: rgba(255,255,255,0.09); }
  .name-input::placeholder { color: var(--text2); }

  .add-btn {
    padding: 11px 18px;
    background: rgba(255,204,0,0.15);
    color: var(--accent);
    border: 1px solid rgba(255,204,0,0.3);
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: rgba(255,204,0,0.25); transform: scale(1.04); }

  /* NAME TAGS */
  .names-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 50px;
  }
  .name-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px 5px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.15s;
    animation: tagIn 0.25s ease;
  }
  @keyframes tagIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .name-tag.done { opacity: 0.28; text-decoration: line-through; }
  .name-tag button {
    background: rgba(0,0,0,0.3);
    border: none;
    border-radius: 50%;
    width: 18px; height: 18px;
    cursor: pointer;
    font-size: 12px;
    color: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .name-tag button:hover { background: rgba(0,0,0,0.55); }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .stat-num {
    font-family: 'Tajawal', sans-serif;
    font-size: 1.9rem;
    font-weight: 900;
    background: linear-gradient(to right, #fff, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 12px; color: var(--text2); }

  /* ACTIONS */
  .action-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .ghost-btn {
    flex: 1;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text2);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: center;
  }
  .ghost-btn:hover { border-color: rgba(255,204,0,0.4); color: var(--accent); background: rgba(255,204,0,0.06); }
  .ghost-btn.danger:hover { border-color: rgba(255,80,80,0.5); color: #ff5050; background: rgba(255,80,80,0.06); }

  /* WINNERS LIST */
  .winners-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .winner-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    animation: slideIn 0.35s ease;
    border: 1px solid rgba(255,255,255,0.08);
  }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .rank-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }

  /* ALL DONE */
  .all-done-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px;
    text-align: center;
  }
  .all-done-overlay.show { display: flex; }
  .trophy { font-size: 4rem; animation: bounce 0.6s ease; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  .all-done-overlay h3 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--text2);
    font-size: 13px;
    opacity: 0.6;
    width: 100%;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .wheel-area { order: 1; }
    .sidebar { order: 2; }
  }

  @media (max-width: 600px) {
    header { padding: 1.8rem 1rem 1rem; }
    h1 { font-size: 2.4rem; }
    .subtitle { font-size: 0.9rem; }
    .logo-badge { font-size: 10px; padding: 5px 14px; }

    .main-grid { gap: 1.2rem; padding: 0 0.8rem 3rem; margin-top: 1rem; }

    .wheel-wrapper { width: min(340px, 92vw); height: min(340px, 92vw); }

    .spin-btn { padding: 14px 40px; font-size: 1rem; width: 100%; max-width: 320px; }

    .winner-display { padding: 16px 18px; }
    .winner-name { font-size: 1.7rem; }

    .panel { padding: 1.1rem; border-radius: 16px; }
    .panel-title { font-size: 0.72rem; }

    .input-row { gap: 6px; }
    .name-input { font-size: 13px; padding: 10px 12px; }
    .add-btn { padding: 10px 14px; font-size: 13px; }

    .stat-num { font-size: 1.5rem; }
    .stats-row { gap: 8px; }
    .stat-card { padding: 12px 8px; }

    .ghost-btn { font-size: 12px; padding: 9px 10px; }

    .names-grid { gap: 6px; }
    .name-tag { font-size: 12px; padding: 4px 6px 4px 10px; }

    .winner-item { padding: 9px 12px; font-size: 13px; }

    .pointer-wrap { left: -22px; }
    .pointer { border-top: 14px solid transparent; border-bottom: 14px solid transparent; border-left: 28px solid var(--accent); }
    .center-dot { width: 36px; height: 36px; }
  }

  @media (max-width: 380px) {
    .wheel-wrapper { width: 90vw; height: 90vw; }
    h1 { font-size: 2rem; }
    .action-row { flex-direction: column; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="content">
  <header>
    <div class="logo-badge">✦ SPIN THE WHEEL ✦</div>
    <h1>عجلة الحظ</h1>
    <p class="subtitle">أضف الأسماء، لف العجلة، واكتشف الفائز!</p>
  </header>

  <div class="main-grid">
    <!-- WHEEL -->
    <div class="wheel-area">
      <div class="wheel-wrapper">
        <div class="pointer-wrap"><div class="pointer"></div></div>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
        <div class="center-dot"></div>
      </div>

      <button class="spin-btn" id="spinBtn" onclick="spin()" disabled>لف العجلة الآن! 🎯</button>

      <div class="winner-display" id="winnerDisplay">
        <div class="winner-label">🏆 الفائز هو</div>
        <div class="winner-name" id="winnerName"></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- STATS -->
      <div class="panel">
        <div class="panel-title">الإحصائيات</div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-num" id="totalCount">0</div>
            <div class="stat-label">إجمالي الأسماء</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="remainCount">0</div>
            <div class="stat-label">متبقي</div>
          </div>
        </div>
      </div>

      <!-- ADD NAMES -->
      <div class="panel">
        <div class="panel-title">إضافة أسماء</div>
        <div class="input-row">
          <input class="name-input" id="nameInput" type="text" placeholder="اكتب اسم..." autocomplete="off" />
          <button class="add-btn" onclick="addName()">+ أضف</button>
        </div>
        <div class="names-grid" id="namesList">
          <div class="empty-state">لا توجد أسماء بعد — أضف أول اسم!</div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="panel">
        <div class="action-row">
          <button class="ghost-btn" onclick="addSample()">📝 أسماء تجريبية</button>
          <button class="ghost-btn danger" onclick="clearAll()">🗑 مسح الكل</button>
        </div>
      </div>

      <!-- WINNERS -->
      <div class="panel" id="winnersPanel" style="display:none">
        <div class="panel-title">ترتيب الفائزين</div>
        <div id="allDoneOverlay" class="all-done-overlay">
          <div class="trophy">🏆</div>
          <h3>انتهت جميع الأسماء!</h3>
          <p style="font-size:13px;color:var(--text2)">شاهد النتائج أدناه</p>
          <button class="ghost-btn" onclick="resetGame()" style="width:100%;margin-top:8px;">🔄 العب مرة أخرى</button>
        </div>
        <div class="winners-list" id="winnersList"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ---- BG PARTICLES ----
(function() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 80; i++) pts.push({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: Math.random()*1.5+0.3, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
    a: Math.random(),
    col: Math.random() > 0.5 ? '255,204,0' : '110,142,251'
  });
  function draw() {
    ctx.clearRect(0,0,W,H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.col},${p.a * 0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ---- WHEEL ENGINE ----
const COLORS = [
  ['#1e1040','#c084fc'],['#0f2e1a','#4ade80'],['#2e1010','#f87171'],
  ['#1a1a00','#facc15'],['#001a2e','#38bdf8'],['#2e1a00','#fb923c'],
  ['#1a002e','#e879f9'],['#002e2e','#2dd4bf'],['#2e2000','#fbbf24'],
  ['#0a2e00','#86efac'],['#2e000f','#fca5a5'],['#000f2e','#93c5fd'],
];

const canvas = document.getElementById('wheelCanvas');
const ctx2 = canvas.getContext('2d');
let CX = 200, CY = 200, R = 186;

function resizeCanvas() {
  const wrapper = document.querySelector('.wheel-wrapper');
  const size = wrapper.offsetWidth;
  canvas.width = size;
  canvas.height = size;
  CX = size / 2;
  CY = size / 2;
  R = size / 2 - 18;
  drawWheel();
}
window.addEventListener('resize', resizeCanvas);

let names = [];
let remaining = [];
let winners = [];
let angle = 0;
let spinning = false;

function drawWheel() {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  const n = remaining.length;
  if (n === 0) { drawEmpty(); return; }
  const slice = (2 * Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const [bg, fg] = COLORS[i % COLORS.length];
    const s = angle + i * slice, e = s + slice;

    ctx2.beginPath();
    ctx2.moveTo(CX, CY);
    ctx2.arc(CX, CY, R, s, e);
    ctx2.closePath();
    ctx2.fillStyle = bg;
    ctx2.fill();
    ctx2.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx2.lineWidth = 1;
    ctx2.stroke();

    ctx2.save();
    ctx2.translate(CX, CY);
    ctx2.rotate(s + slice / 2);
    ctx2.textAlign = 'right';
    ctx2.fillStyle = fg;
    const fontSize = n > 12 ? Math.max(9, R * 0.055) : n > 8 ? Math.max(10, R * 0.062) : Math.max(11, R * 0.07);
    ctx2.font = `600 ${fontSize}px Cairo,sans-serif`;
    const label = remaining[i].length > 10 ? remaining[i].slice(0, 9) + '…' : remaining[i];
    ctx2.fillText(label, R - 12, 5);
    ctx2.restore();
  }

  ctx2.beginPath();
  ctx2.arc(CX, CY, R, 0, 2 * Math.PI);
  ctx2.strokeStyle = 'rgba(255,204,0,0.3)';
  ctx2.lineWidth = 2;
  ctx2.stroke();
}

function drawEmpty() {
  ctx2.beginPath();
  ctx2.arc(CX,CY,R,0,2*Math.PI);
  const g = ctx2.createRadialGradient(CX,CY,0,CX,CY,R);
  g.addColorStop(0,'#1a1640');
  g.addColorStop(1,'#0f0c29');
  ctx2.fillStyle = g;
  ctx2.fill();
  ctx2.strokeStyle = 'rgba(255,204,0,0.15)';
  ctx2.lineWidth = 2;
  ctx2.stroke();
  ctx2.fillStyle = 'rgba(255,255,255,0.35)';
  ctx2.font = '500 16px Cairo,sans-serif';
  ctx2.textAlign = 'center';
  ctx2.fillText('أضف أسماء لتبدأ', CX, CY+6);
}

function addName() {
  const inp = document.getElementById('nameInput');
  const v = inp.value.trim();
  if (!v || names.includes(v)) { inp.focus(); return; }
  names.push(v);
  remaining.push(v);
  inp.value = '';
  inp.focus();
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addName();
});

function removeName(name) {
  names = names.filter(x => x !== name);
  remaining = remaining.filter(x => x !== name);
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

function renderTags() {
  const el = document.getElementById('namesList');
  if (names.length === 0) {
    el.innerHTML = '<div class="empty-state">لا توجد أسماء بعد — أضف أول اسم!</div>';
    return;
  }
  el.innerHTML = '';
  names.forEach((n, i) => {
    const [bg, fg] = COLORS[i % COLORS.length];
    const isDone = !remaining.includes(n);
    const tag = document.createElement('span');
    tag.className = 'name-tag' + (isDone ? ' done' : '');
    tag.style.background = bg;
    tag.style.color = fg;
    tag.style.border = `1px solid ${fg}30`;
    tag.innerHTML = `${n}<button onclick="removeName('${n.replace(/'/g,"\\'")}')">×</button>`;
    el.appendChild(tag);
  });
}

function updateStats() {
  document.getElementById('totalCount').textContent = names.length;
  document.getElementById('remainCount').textContent = remaining.length;
}

function clearAll() {
  names = []; remaining = []; winners = [];
  angle = 0;
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('winnerDisplay').classList.remove('show');
  document.getElementById('winnersPanel').style.display = 'none';
  document.getElementById('allDoneOverlay').classList.remove('show');
  document.getElementById('winnersList').innerHTML = '';
}

function addSample() {
  const samples = ['أحمد','محمد','سارة','فاطمة','علي','مريم','يوسف','ليلى','عمر','نور'];
  samples.forEach(n => {
    if (!names.includes(n)) { names.push(n); remaining.push(n); }
  });
  renderTags(); updateStats(); drawWheel();
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

function spin() {
  if (spinning || remaining.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('winnerDisplay').classList.remove('show');

  const n = remaining.length;
  const slice = (2*Math.PI)/n;
  const winIdx = Math.floor(Math.random() * n);

  // Pointer is on the RIGHT (angle = PI from canvas zero)
  const winCenter = winIdx * slice + slice / 2;
  const target = Math.PI - winCenter;
  const extra = (6 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const startAngle = angle % (2 * Math.PI);
  let delta = ((target - startAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (delta < 0.2) delta += 2 * Math.PI;
  const totalDelta = extra + delta;

  const dur = 4500 + Math.random()*1500;
  const t0 = performance.now();

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    angle = startAngle + totalDelta * ease(t);
    drawWheel();
    if (t < 1) { requestAnimationFrame(frame); }
    else {
      angle = startAngle + totalDelta;
      drawWheel();
      spinning = false;
      revealWinner(winIdx);
    }
  }
  requestAnimationFrame(frame);
}

function revealWinner(idx) {
  const name = remaining[idx];
  winners.push(name);
  remaining.splice(idx, 1);

  document.getElementById('winnerName').textContent = name;
  document.getElementById('winnerDisplay').classList.add('show');

  launchConfetti();
  renderTags();
  updateStats();

  document.getElementById('winnersPanel').style.display = 'block';
  const list = document.getElementById('winnersList');
  const item = document.createElement('div');
  item.className = 'winner-item';
  const medals = ['🥇','🥈','🥉'];
  const badge = document.createElement('div');
  badge.className = 'rank-badge';
  badge.style.background = COLORS[(winners.length-1) % COLORS.length][0];
  badge.style.color = COLORS[(winners.length-1) % COLORS.length][1];
  badge.style.fontSize = winners.length <= 3 ? '16px' : '11px';
  badge.textContent = winners.length <= 3 ? medals[winners.length-1] : '#'+winners.length;
  item.appendChild(badge);
  const nameSpan = document.createElement('span');
  nameSpan.textContent = name;
  item.appendChild(nameSpan);
  list.appendChild(item);

  if (remaining.length === 0) {
    setTimeout(() => {
      document.getElementById('allDoneOverlay').classList.add('show');
    }, 1500);
  } else {
    setTimeout(() => {
      drawWheel();
      document.getElementById('spinBtn').disabled = false;
    }, 1200);
  }
}

function resetGame() {
  remaining = [...names];
  winners = [];
  angle = 0;
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('winnerDisplay').classList.remove('show');
  document.getElementById('allDoneOverlay').classList.remove('show');
  document.getElementById('winnersList').innerHTML = '';
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

function launchConfetti() {
  const cols = ['#ffcc00','#6e8efb','#a777e3','#4ade80','#f87171','#38bdf8'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = cols[Math.floor(Math.random()*cols.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random()*2) + 's';
      el.style.animationDelay = (Math.random()*0.5) + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 25);
  }
}

// Init
drawEmpty();
</script>
