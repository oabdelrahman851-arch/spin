<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عجلة الحظ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a26;
    --accent: #f0c040;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --text: #f0eee8;
    --text2: #9998b0;
    --border: rgba(255,255,255,0.08);
    --glow: rgba(240,192,64,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND PARTICLES */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .content { position: relative; z-index: 1; }

  /* HEADER */
  header {
    text-align: center;
    padding: 3rem 1rem 1rem;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(240,192,64,0.1);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 1.5rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #f0c040 0%, #ff9f43 40%, #ff6b35 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-size: 1.1rem;
    color: var(--text2);
    font-weight: 400;
  }

  /* MAIN LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
    align-items: start;
  }

  /* WHEEL AREA */
  .wheel-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .wheel-wrapper {
    position: relative;
    width: 400px;
    height: 400px;
    filter: drop-shadow(0 0 60px rgba(240,192,64,0.2));
  }

  #wheelCanvas {
    border-radius: 50%;
  }

  .pointer-wrap {
    position: absolute;
    top: 50%;
    left: -30px;
    transform: translateY(-50%);
    z-index: 10;
  }
  .pointer {
    width: 0; height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-left: 36px solid var(--accent);
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .center-dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--accent);
    box-shadow: 0 0 20px var(--glow);
    z-index: 5;
  }

  /* SPIN BTN */
  .spin-btn {
    position: relative;
    padding: 16px 60px;
    font-size: 1.2rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    overflow: hidden;
    background: linear-gradient(135deg, #f0c040, #ff6b35);
    color: #0a0a0f;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(240,192,64,0.35);
    letter-spacing: 1px;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }
  .spin-btn:hover::before { left: 100%; }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(240,192,64,0.5); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* WINNER DISPLAY */
  .winner-display {
    width: 100%;
    max-width: 400px;
    background: linear-gradient(135deg, rgba(240,192,64,0.08), rgba(255,107,53,0.05));
    border: 1px solid rgba(240,192,64,0.25);
    border-radius: 20px;
    padding: 20px 24px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }
  .winner-display.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .winner-label {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .winner-name {
    font-family: 'Tajawal', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #f0c040, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    top: -20px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
  }

  .panel-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* INPUT */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .name-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }
  .name-input:focus { border-color: rgba(240,192,64,0.5); }
  .add-btn {
    padding: 10px 18px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; transform: scale(1.03); }

  /* NAME TAGS */
  .names-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 50px;
  }
  .name-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px 5px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.15s;
    animation: tagIn 0.25s ease;
  }
  @keyframes tagIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .name-tag.done { opacity: 0.3; text-decoration: line-through; }
  .name-tag button {
    background: rgba(0,0,0,0.25);
    border: none;
    border-radius: 50%;
    width: 18px; height: 18px;
    cursor: pointer;
    font-size: 12px;
    color: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .name-tag button:hover { background: rgba(0,0,0,0.5); }

  /* WINNERS LIST */
  .winners-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .winner-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg3);
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .rank-badge {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }

  .action-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .ghost-btn {
    flex: 1;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text2);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    text-align: center;
  }
  .ghost-btn:hover { border-color: rgba(240,192,64,0.4); color: var(--accent); }
  .ghost-btn.danger:hover { border-color: rgba(255,80,80,0.5); color: #ff5050; }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: var(--bg3);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Tajawal', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #f0c040, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 12px; color: var(--text2); }

  /* ALL DONE */
  .all-done-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px;
    text-align: center;
  }
  .all-done-overlay.show { display: flex; }
  .trophy { font-size: 4rem; animation: bounce 0.6s ease; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  .all-done-overlay h3 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--text2);
    font-size: 13px;
    opacity: 0.6;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .wheel-wrapper { width: 300px; height: 300px; }
    .wheel-area { order: 1; }
    .sidebar { order: 2; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="content">
  <header>
    <div class="logo-badge">✦ SPIN THE WHEEL ✦</div>
    <h1>عجلة الحظ</h1>
    <p class="subtitle">أضف الأسماء، لف العجلة، واكتشف الفائز!</p>
  </header>

  <div class="main-grid">
    <!-- WHEEL -->
    <div class="wheel-area">
      <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
        <div class="pointer-wrap"><div class="pointer"></div></div>
        <div class="center-dot"></div>
      </div>

      <button class="spin-btn" id="spinBtn" onclick="spin()" disabled>🎯 لف!</button>

      <div class="winner-display" id="winnerDisplay">
        <div class="winner-label">🏆 الفائز هو</div>
        <div class="winner-name" id="winnerName"></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- STATS -->
      <div class="panel">
        <div class="panel-title">الإحصائيات</div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-num" id="totalCount">0</div>
            <div class="stat-label">إجمالي الأسماء</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="remainCount">0</div>
            <div class="stat-label">متبقي</div>
          </div>
        </div>
      </div>

      <!-- ADD NAMES -->
      <div class="panel">
        <div class="panel-title">إضافة أسماء</div>
        <div class="input-row">
          <input class="name-input" id="nameInput" type="text" placeholder="اكتب اسم..." autocomplete="off" />
          <button class="add-btn" onclick="addName()">+ أضف</button>
        </div>
        <div class="names-grid" id="namesList">
          <div class="empty-state">لا توجد أسماء بعد — أضف أول اسم!</div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="panel">
        <div class="action-row">
          <button class="ghost-btn" onclick="addSample()">📝 أسماء تجريبية</button>
          <button class="ghost-btn danger" onclick="clearAll()">🗑 مسح الكل</button>
        </div>
      </div>

      <!-- WINNERS -->
      <div class="panel" id="winnersPanel" style="display:none">
        <div class="panel-title">ترتيب الفائزين</div>
        <div id="allDoneOverlay" class="all-done-overlay">
          <div class="trophy">🏆</div>
          <h3>انتهت جميع الأسماء!</h3>
          <p style="font-size:13px;color:var(--text2)">شاهد النتائج أدناه</p>
          <button class="ghost-btn" onclick="resetGame()" style="width:100%;margin-top:8px;">🔄 العب مرة أخرى</button>
        </div>
        <div class="winners-list" id="winnersList"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ---- BG PARTICLES ----
(function() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 80; i++) pts.push({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: Math.random()*1.5+0.3, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
    a: Math.random()
  });
  function draw() {
    ctx.clearRect(0,0,W,H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,192,64,${p.a * 0.6})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ---- WHEEL ENGINE ----
const COLORS = [
  ['#1e1040','#c084fc'],['#0f2e1a','#4ade80'],['#2e1010','#f87171'],
  ['#1a1a00','#facc15'],['#001a2e','#38bdf8'],['#2e1a00','#fb923c'],
  ['#1a002e','#e879f9'],['#002e2e','#2dd4bf'],['#2e2000','#fbbf24'],
  ['#0a2e00','#86efac'],['#2e000f','#fca5a5'],['#000f2e','#93c5fd'],
];

const canvas = document.getElementById('wheelCanvas');
const ctx2 = canvas.getContext('2d');
const R = 196, CX = 200, CY = 200;

let names = [];
let remaining = [];
let winners = [];
let angle = 0;
let spinning = false;

function drawWheel() {
  ctx2.clearRect(0,0,400,400);
  const n = remaining.length;
  if (n === 0) { drawEmpty(); return; }
  const slice = (2*Math.PI)/n;

  for (let i = 0; i < n; i++) {
    const [bg, fg] = COLORS[i % COLORS.length];
    const s = angle + i*slice, e = s + slice;

    // Segment
    ctx2.beginPath();
    ctx2.moveTo(CX,CY);
    ctx2.arc(CX,CY,R,s,e);
    ctx2.closePath();
    ctx2.fillStyle = bg;
    ctx2.fill();

    // Glow border
    ctx2.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx2.lineWidth = 1;
    ctx2.stroke();

    // Text
    ctx2.save();
    ctx2.translate(CX,CY);
    ctx2.rotate(s + slice/2);
    ctx2.textAlign = 'right';
    ctx2.fillStyle = fg;
    ctx2.font = `600 ${n > 12 ? 11 : 13}px Cairo,sans-serif`;
    const label = remaining[i].length > 10 ? remaining[i].slice(0,9)+'…' : remaining[i];
    ctx2.fillText(label, R-14, 5);
    ctx2.restore();
  }

  // Outer ring
  ctx2.beginPath();
  ctx2.arc(CX,CY,R,0,2*Math.PI);
  ctx2.strokeStyle = 'rgba(240,192,64,0.3)';
  ctx2.lineWidth = 2;
  ctx2.stroke();
}

function drawEmpty() {
  ctx2.beginPath();
  ctx2.arc(CX,CY,R,0,2*Math.PI);
  ctx2.fillStyle = '#1a1a26';
  ctx2.fill();
  ctx2.strokeStyle = 'rgba(240,192,64,0.15)';
  ctx2.lineWidth = 2;
  ctx2.stroke();
  ctx2.fillStyle = 'rgba(153,152,176,0.5)';
  ctx2.font = '500 16px Cairo,sans-serif';
  ctx2.textAlign = 'center';
  ctx2.fillText('أضف أسماء لتبدأ', CX, CY);
}

function addName() {
  const inp = document.getElementById('nameInput');
  const v = inp.value.trim();
  if (!v || names.includes(v)) { inp.focus(); return; }
  names.push(v);
  remaining.push(v);
  inp.value = '';
  inp.focus();
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addName();
});

function removeName(name) {
  names = names.filter(x => x !== name);
  remaining = remaining.filter(x => x !== name);
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

function renderTags() {
  const el = document.getElementById('namesList');
  if (names.length === 0) {
    el.innerHTML = '<div class="empty-state">لا توجد أسماء بعد — أضف أول اسم!</div>';
    return;
  }
  el.innerHTML = '';
  names.forEach((n, i) => {
    const [bg, fg] = COLORS[i % COLORS.length];
    const isDone = !remaining.includes(n);
    const tag = document.createElement('span');
    tag.className = 'name-tag' + (isDone ? ' done' : '');
    tag.style.background = bg;
    tag.style.color = fg;
    tag.style.border = `1px solid ${fg}30`;
    tag.innerHTML = `${n}<button onclick="removeName('${n.replace(/'/g,"\\'")}')">×</button>`;
    el.appendChild(tag);
  });
}

function updateStats() {
  document.getElementById('totalCount').textContent = names.length;
  document.getElementById('remainCount').textContent = remaining.length;
}

function clearAll() {
  names = []; remaining = []; winners = [];
  angle = 0;
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('winnerDisplay').classList.remove('show');
  document.getElementById('winnersPanel').style.display = 'none';
  document.getElementById('allDoneOverlay').classList.remove('show');
  document.getElementById('winnersList').innerHTML = '';
}

function addSample() {
  const samples = ['أحمد','محمد','سارة','فاطمة','علي','مريم','يوسف','ليلى','عمر','نور'];
  samples.forEach(n => {
    if (!names.includes(n)) { names.push(n); remaining.push(n); }
  });
  renderTags(); updateStats(); drawWheel();
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

function spin() {
  if (spinning || remaining.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('winnerDisplay').classList.remove('show');

  const n = remaining.length;
  const slice = (2*Math.PI)/n;
  const winIdx = Math.floor(Math.random() * n);
  // Win angle: pointer is at LEFT (angle=PI), so winning segment center = PI
  const winCenter = winIdx * slice + slice/2;
  const target = Math.PI - winCenter;
  const extra = (6 + Math.floor(Math.random()*4)) * 2 * Math.PI;
  const startAngle = angle;
  let delta = ((target - (startAngle % (2*Math.PI))) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  if (delta < 0.2) delta += 2*Math.PI;
  const totalDelta = extra + delta;

  const dur = 4500 + Math.random()*1500;
  const t0 = performance.now();

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    angle = startAngle + totalDelta * ease(t);
    drawWheel();
    if (t < 1) { requestAnimationFrame(frame); }
    else {
      angle = startAngle + totalDelta;
      drawWheel();
      spinning = false;
      revealWinner(winIdx);
    }
  }
  requestAnimationFrame(frame);
}

function revealWinner(idx) {
  const name = remaining[idx];
  winners.push(name);
  remaining.splice(idx, 1);

  // Show banner
  const disp = document.getElementById('winnerDisplay');
  document.getElementById('winnerName').textContent = name;
  disp.classList.add('show');

  // Confetti
  launchConfetti();

  // Update tags & stats
  renderTags();
  updateStats();

  // Show winners panel
  document.getElementById('winnersPanel').style.display = 'block';
  const list = document.getElementById('winnersList');
  const item = document.createElement('div');
  item.className = 'winner-item';
  const medals = ['🥇','🥈','🥉'];
  const badge = document.createElement('div');
  badge.className = 'rank-badge';
  badge.style.background = COLORS[(winners.length-1) % COLORS.length][0];
  badge.style.color = COLORS[(winners.length-1) % COLORS.length][1];
  badge.style.fontSize = winners.length <= 3 ? '16px' : '11px';
  badge.textContent = winners.length <= 3 ? medals[winners.length-1] : '#'+winners.length;
  item.appendChild(badge);
  const nameSpan = document.createElement('span');
  nameSpan.textContent = name;
  item.appendChild(nameSpan);
  list.appendChild(item);

  if (remaining.length === 0) {
    setTimeout(() => {
      document.getElementById('allDoneOverlay').classList.add('show');
    }, 1500);
  } else {
    setTimeout(() => {
      drawWheel();
      document.getElementById('spinBtn').disabled = false;
    }, 1200);
  }
}

function resetGame() {
  remaining = [...names];
  winners = [];
  angle = 0;
  renderTags();
  updateStats();
  drawWheel();
  document.getElementById('winnerDisplay').classList.remove('show');
  document.getElementById('allDoneOverlay').classList.remove('show');
  document.getElementById('winnersList').innerHTML = '';
  document.getElementById('spinBtn').disabled = remaining.length < 2;
}

function launchConfetti() {
  const cols = ['#f0c040','#ff6b35','#7c3aed','#38bdf8','#4ade80','#f87171'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = cols[Math.floor(Math.random()*cols.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random()*2) + 's';
      el.style.animationDelay = (Math.random()*0.5) + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 25);
  }
}

// Init
drawEmpty();
</script>
</body>
